<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fugaz+One&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./index.css">

    <title>Color Schemer</title>
    <link rel="shortcut icon" href="./logo.png" type="image/x-icon">
</head>
<body>
    <header>
        <h2>Color Schemer</h2>
        <p id="theme-toggle">
            🌒☀️
        </p>

    </header>
    <main>
        <div class="container">
            <div id="main-div">
                <form action="" id="user-form">
                    <input type="color">
                    <select name="mode" id="dropdown">
                        <option value="Monochrome">Monochrome</option>
                        <option value="Monochrome">Monochrome 1</option>
                        <option value="Monochrome">Monochrome 2</option>
                        <option value="Monochrome">Monochrome 3</option>
                        <option value="Monochrome">Monochrome 4</option>
                        <option value="Monochrome">Monochrome 5</option>
                        <option value="Monochrome">Monochrome 6</option>
                    </select>
                    <button type="submit" id="get-color-btn">Get color scheme</button>
                </form>
                <div id="color-scheme">
                    <div id="color-display">
                        <div class="color"></div>
                        <div class="color-code"></div>
                    </div>
                    <div id="color-display">
                        <div class="color"></div>
                        <div class="color-code"></div>
                    </div>
                    <div id="color-display">
                        <div class="color"></div>
                        <div class="color-code"></div>
                    </div>
                    <div id="color-display">
                        <div class="color"></div>
                        <div class="color-code"></div>
                    </div>
                    <div id="color-display">
                        <div class="color"></div>
                        <div class="color-code"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer>Copyright © 2026</footer>
    <script type="module" src="index.js"></script>
</body>
</html>
