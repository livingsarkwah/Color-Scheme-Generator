<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fugaz+One&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./index.css">

    <title>Color Schemer</title>
    <link rel="shortcut icon" href="./logo.png" type="image/x-icon">
</head>
<body>
    <header>
        <h2>Color Schemer</h2>
        <p id="theme-toggle">
            🌒☀️
        </p>

    </header>
    <main>
        <div id="main-div">
            <form action="" id="user-form">
                <input type="color" id="color-input">
                <div id="dropdown">
                    <select name="mode" id="mode-input">
                        <option value="monochrome" selected>Monochrome</option>
                        <option value="monochrome-dark">Monochrome Light</option>
                        <option value="monochrome-light">Monochrome Dark</option>
                        <option value="analogic">Analogic</option>
                        <option value="complement">Complement</option>
                        <option value="analogic-complement">Analogic Complement</option>
                        <option value="triad">Triad</option>
                        <option value="quad">Quad</option>
                    </select>
                </div>
                <button type="submit" id="get-color-btn">Get color scheme</button>
            </form>
            <div id="color-scheme"></div>
        </div>
    </main>
    <footer>Copyright © 2026</footer>
    <script type="module" src="index.js"></script>
</body>
</html>
